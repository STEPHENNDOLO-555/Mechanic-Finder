<!-- templates/admin/modals.html -->
<!-- Customer Modal -->
<div id="customerModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-title">Add Customer</h3>
            <span class="modal-close" onclick="closeModal('customerModal')">&times;</span>
        </div>
        <div class="modal-body">
            <form id="customer-form">
                <input type="hidden" id="customer-id">
                <div class="form-group">
                    <label>Username *</label>
                    <input type="text" id="customer-username" required>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="customer-email" required>
                </div>
                <div class="form-group">
                    <label>Phone *</label>
                    <input type="text" id="customer-phone" required>
                </div>
                <div class="form-group">
                    <label>Location *</label>
                    <input type="text" id="customer-location" required>
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="customer-password" required>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal('customerModal')">Cancel</button>
            <button class="btn-submit" onclick="saveCustomer()">Save</button>
        </div>
    </div>
</div>

<!-- Mechanic Modal -->
<div id="mechanicModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="mechanic-modal-title">Add Mechanic</h3>
            <span class="modal-close" onclick="closeModal('mechanicModal')">&times;</span>
        </div>
        <div class="modal-body">
            <form id="mechanic-form">
                <input type="hidden" id="mechanic-id">
                <div class="form-group">
                    <label>Username *</label>
                    <input type="text" id="mechanic-username" required>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="mechanic-email" required>
                </div>
                <div class="form-group">
                    <label>Phone *</label>
                    <input type="text" id="mechanic-phone" required>
                </div>
                <div class="form-group">
                    <label>Location *</label>
                    <input type="text" id="mechanic-location" required>
                </div>
                <div class="form-group">
                    <label>Skill Level *</label>
                    <select id="mechanic-skill" required>
                        <option value="Junior">Junior</option>
                        <option value="Mid-Level">Mid-Level</option>
                        <option value="Expert">Expert</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Salary</label>
                    <input type="number" id="mechanic-salary">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="mechanic-hired"> Hired
                    </label>
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="mechanic-password" required>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal('mechanicModal')">Cancel</button>
            <button class="btn-submit" onclick="saveMechanic()">Save</button>
        </div>
    </div>
</div>

<!-- Request Modal -->
<div id="requestModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Edit Request</h3>
            <span class="modal-close" onclick="closeModal('requestModal')">&times;</span>
        </div>
        <div class="modal-body">
            <form id="request-form">
                <input type="hidden" id="request-id">
                <div class="form-group">
                    <label>Status</label>
                    <select id="request-status">
                        <option value="Pending">Pending</option>
                        <option value="Approved">Approved</option>
                        <option value="Repairing">Repairing</option>
                        <option value="Repairing Done">Repairing Done</option>
                        <option value="Released">Released</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Cost ($)</label>
                    <input type="number" id="request-cost">
                </div>
                <div class="form-group">
                    <label>Assign Mechanic</label>
                    <select id="request-mechanic">
                        <option value="">Select Mechanic</option>
                        {% for mechanic in mechanics %}
                        <option value="{{ mechanic.id }}">{{ mechanic.username }}</option>
                        {% endfor %}
                    </select>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal('requestModal')">Cancel</button>
            <button class="btn-submit" onclick="saveRequest()">Save</button>
        </div>
    </div>
</div>

<!-- Attendance Modal -->
<div id="attendanceModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="attendance-modal-title">Mark Attendance</h3>
            <span class="modal-close" onclick="closeModal('attendanceModal')">&times;</span>
        </div>
        <div class="modal-body">
            <form id="attendance-form">
                <input type="hidden" id="attendance-id">
                <div class="form-group">
                    <label>Mechanic *</label>
                    <select id="attendance-mechanic" required>
                        <option value="">Select Mechanic</option>
                        {% for mechanic in mechanics %}
                        <option value="{{ mechanic.id }}">{{ mechanic.username }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="attendance-status">
                        <option value="Yes">Present</option>
                        <option value="No">Absent</option>
                    </select>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal('attendanceModal')">Cancel</button>
            <button class="btn-submit" onclick="saveAttendance()">Save</button>
        </div>
    </div>
</div>

<!-- Newsletter Modal -->
<div id="newsletterModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Add Newsletter Subscriber</h3>
            <span class="modal-close" onclick="closeModal('newsletterModal')">&times;</span>
        </div>
        <div class="modal-body">
            <form>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="newsletter-email" required>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal('newsletterModal')">Cancel</button>
            <button class="btn-submit" onclick="saveNewsletter()">Save</button>
        </div>
    </div>
</div>
