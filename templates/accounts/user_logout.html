{% extends "others/base1.html" %}
{% load crispy_forms_tags %}
{% load static %}

{% block name %}
<style>
    /* Modern CSS Reset */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        position: relative;
        overflow-x: hidden;
    }

    /* Animated Background Particles */
    body::before {
        content: '';
        position: absolute;
        width: 200%;
        height: 200%;
        background: 
            radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%),
            repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 8px);
        animation: floatBackground 20s linear infinite;
        pointer-events: none;
    }

    @keyframes floatBackground {
        0% {
            transform: translate(0, 0);
        }
        100% {
            transform: translate(50px, 50px);
        }
    }

    /* Floating Particles */
    .particles {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
        pointer-events: none;
    }

    .particle {
        position: absolute;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        animation: floatParticle linear infinite;
    }

    @keyframes floatParticle {
        0% {
            transform: translateY(100vh) rotate(0deg);
            opacity: 0;
        }
        10% {
            opacity: 1;
        }
        90% {
            opacity: 1;
        }
        100% {
            transform: translateY(-100vh) rotate(360deg);
            opacity: 0;
        }
    }

    /* Main Container */
    .logout-container {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 550px;
        margin: 20px;
        animation: slideInUp 0.6s ease-out;
    }

    @keyframes slideInUp {
        from {
            opacity: 0;
            transform: translateY(40px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Logout Card */
    .logout-card {
        background: rgba(255, 255, 255, 0.98);
        border-radius: 32px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        backdrop-filter: blur(10px);
        text-align: center;
    }

    .logout-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.3);
    }

    /* Card Header with Animation */
    .card-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 2.5rem 2rem;
        position: relative;
        overflow: hidden;
    }

    .card-header::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
        background-size: 30px 30px;
        animation: shimmer 15s linear infinite;
    }

    @keyframes shimmer {
        0% {
            transform: translate(0, 0);
        }
        100% {
            transform: translate(50px, 50px);
        }
    }

    /* Animated Icon */
    .logout-icon {
        width: 100px;
        height: 100px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
        position: relative;
        z-index: 1;
        animation: pulse 2s ease-in-out infinite, rotateIcon 10s linear infinite;
    }

    @keyframes pulse {
        0%, 100% {
            transform: scale(1);
            box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
        }
        50% {
            transform: scale(1.05);
            box-shadow: 0 0 0 20px rgba(255, 255, 255, 0);
        }
    }

    @keyframes rotateIcon {
        0% {
            transform: scale(1) rotate(0deg);
        }
        100% {
            transform: scale(1) rotate(360deg);
        }
    }

    .logout-icon i {
        font-size: 3.5rem;
        color: white;
        animation: counterRotate 10s linear infinite;
    }

    @keyframes counterRotate {
        0% {
            transform: rotate(0deg);
        }
        100% {
            transform: rotate(-360deg);
        }
    }

    /* Card Content */
    .card-content {
        padding: 2.5rem;
    }

    /* Typography */
    .card-content h1 {
        font-size: 2.5rem;
        font-weight: 700;
        color: #2d3748;
        margin: 0 0 1rem 0;
        letter-spacing: -0.5px;
        position: relative;
        display: inline-block;
    }

    .card-content h1::after {
        content: '';
        position: absolute;
        bottom: -10px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 3px;
        background: linear-gradient(90deg, #667eea, #764ba2);
        border-radius: 3px;
    }

    .card-content h3 {
        font-size: 1.1rem;
        font-weight: 500;
        color: #718096;
        margin: 1.5rem 0;
        line-height: 1.6;
    }

    /* Decorative Elements */
    .decorative-line {
        width: 80px;
        height: 2px;
        background: linear-gradient(90deg, transparent, #667eea, #764ba2, transparent);
        margin: 1rem auto;
    }

    .smiley-icon {
        font-size: 2rem;
        margin: 0 0.25rem;
        display: inline-block;
        animation: bounce 1s ease-in-out infinite;
    }

    @keyframes bounce {
        0%, 100% {
            transform: translateY(0);
        }
        50% {
            transform: translateY(-5px);
        }
    }

    /* Button */
    .login-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        text-decoration: none;
        padding: 14px 32px;
        border-radius: 50px;
        font-size: 1rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        margin-top: 0.5rem;
        border: none;
        cursor: pointer;
    }

    .login-button::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
    }

    .login-button:hover::before {
        width: 300px;
        height: 300px;
    }

    .login-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .login-button:active {
        transform: translateY(0);
    }

    .login-button i {
        font-size: 1.1rem;
        transition: transform 0.3s ease;
    }

    .login-button:hover i {
        transform: translateX(-3px);
    }

    /* Additional Info */
    .help-text {
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e2e8f0;
        font-size: 0.85rem;
        color: #a0aec0;
    }

    .help-text a {
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
    }

    .help-text a:hover {
        color: #764ba2;
        text-decoration: underline;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        .logout-container {
            max-width: 90%;
            margin: 15px;
        }

        .card-header {
            padding: 1.5rem;
        }

        .logout-icon {
            width: 80px;
            height: 80px;
        }

        .logout-icon i {
            font-size: 2.5rem;
        }

        .card-content {
            padding: 1.75rem;
        }

        .card-content h1 {
            font-size: 2rem;
        }

        .card-content h3 {
            font-size: 1rem;
        }

        .login-button {
            padding: 12px 28px;
            font-size: 0.9rem;
        }
    }

    @media (max-width: 480px) {
        .card-content {
            padding: 1.5rem;
        }

        .card-content h1 {
            font-size: 1.75rem;
        }

        .card-content h3 {
            font-size: 0.9rem;
        }

        .login-button {
            padding: 10px 24px;
            font-size: 0.85rem;
            width: 100%;
        }
    }

    /* Dark Mode Support */
    @media (prefers-color-scheme: dark) {
        .logout-card {
            background: rgba(26, 32, 44, 0.98);
        }

        .card-content h1 {
            color: #f7fafc;
        }

        .card-content h3 {
            color: #a0aec0;
        }

        .help-text {
            border-top-color: #2d3748;
        }
    }
</style>

<!-- Generate Floating Particles -->
<div class="particles" id="particles"></div>

<div class="logout-container">
    <div class="logout-card">
        <div class="card-header">
            <div class="logout-icon">
                <i class="fa fa-sign-out"></i>
            </div>
        </div>
        
        <div class="card-content">
            <h1>See You Soon!</h1>
            <div class="decorative-line"></div>
            <h3>
                Thanks for spending some quality time with us!
                <span class="smiley-icon">😊</span>
            </h3>
            
            <a href="{% url 'user_login' %}" class="login-button">
                <i class="fa fa-sign-in"></i>
                <span>Log in Again</span>
                <i class="fa fa-arrow-right"></i>
            </a>
            
            <div class="help-text">
                <i class="fa fa-question-circle"></i>
                <span>Having trouble? </span>
                <a href="#">Contact Support</a>
            </div>
        </div>
    </div>
</div>

<script>
    // Create floating particles
    function createParticles() {
        const particlesContainer = document.getElementById('particles');
        const particleCount = 50;
        
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            // Random size between 2px and 8px
            const size = Math.random() * 6 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            
            // Random position
            particle.style.left = Math.random() * 100 + '%';
            
            // Random animation duration between 8s and 20s
            const duration = Math.random() * 12 + 8;
            particle.style.animation = `floatParticle ${duration}s linear infinite`;
            
            // Random delay
            particle.style.animationDelay = Math.random() * 15 + 's';
            
            // Random opacity
            particle.style.opacity = Math.random() * 0.5 + 0.2;
            
            particlesContainer.appendChild(particle);
        }
    }
    
    // Add page transition effect
    document.addEventListener('DOMContentLoaded', function() {
        createParticles();
        
        // Add fade-in animation to container
        const container = document.querySelector('.logout-container');
        container.style.opacity = '0';
        container.style.animation = 'slideInUp 0.6s ease-out forwards';
        
        // Add a small delay to show particles
        setTimeout(() => {
            container.style.opacity = '1';
        }, 100);
    });
    
    // Add click ripple effect to button
    const button = document.querySelector('.login-button');
    if (button) {
        button.addEventListener('click', function(e) {
            const ripple = document.createElement('span');
            ripple.style.position = 'absolute';
            ripple.style.borderRadius = '50%';
            ripple.style.backgroundColor = 'rgba(255, 255, 255, 0.6)';
            ripple.style.width = '100px';
            ripple.style.height = '100px';
            ripple.style.transform = 'scale(0)';
            ripple.style.animation = 'ripple 0.6s linear';
            ripple.style.pointerEvents = 'none';
            
            const rect = button.getBoundingClientRect();
            ripple.style.left = (e.clientX - rect.left - 50) + 'px';
            ripple.style.top = (e.clientY - rect.top - 50) + 'px';
            
            button.style.position = 'relative';
            button.style.overflow = 'hidden';
            button.appendChild(ripple);
            
            setTimeout(() => ripple.remove(), 600);
        });
    }
    
    // Add ripple animation style
    const style = document.createElement('style');
    style.textContent = `
        @keyframes ripple {
            to {
                transform: scale(2);
                opacity: 0;
            }
        }
    `;
    document.head.appendChild(style);
    
    // Optional: Add countdown timer before redirect (if needed)
    // Uncomment the following code to add a 5-second countdown
    /*
    let seconds = 5;
    const buttonText = document.querySelector('.login-button span');
    const timer = setInterval(() => {
        seconds--;
        if (seconds > 0) {
            buttonText.textContent = `Log in Again (${seconds})`;
        } else {
            clearInterval(timer);
            buttonText.textContent = 'Log in Again';
            window.location.href = "{% url 'user_login' %}";
        }
    }, 1000);
    */
</script>

{% endblock %}
