{% extends "others/base1.html" %}
{% load crispy_forms_tags %}
{% load static %}

{% block name %}
<style>
    /* Modern CSS Reset and Base Styles */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        position: relative;
        overflow-x: hidden;
    }

    /* Animated Background */
    body::before {
        content: '';
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
        background-size: 50px 50px;
        animation: moveBackground 20s linear infinite;
        opacity: 0.3;
    }

    @keyframes moveBackground {
        0% {
            transform: translate(0, 0);
        }
        100% {
            transform: translate(50px, 50px);
        }
    }

    /* Main Container */
    .attendance-container {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 600px;
        padding: 20px;
        margin: 50px auto;
    }

    /* Card Design */
    .attendance-card {
        background: rgba(255, 255, 255, 0.98);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        backdrop-filter: blur(10px);
        transform: translateY(0);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        animation: slideInUp 0.6s ease-out;
    }

    .attendance-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 25px 70px rgba(0, 0, 0, 0.4);
    }

    @keyframes slideInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Header Section */
    .card-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 30px;
        text-align: center;
        position: relative;
        overflow: hidden;
    }

    .card-header::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
        background-size: 30px 30px;
        animation: shimmer 10s linear infinite;
    }

    @keyframes shimmer {
        0% {
            transform: translate(0, 0);
        }
        100% {
            transform: translate(50px, 50px);
        }
    }

    .header-icon {
        width: 80px;
        height: 80px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 15px;
        position: relative;
        z-index: 1;
        animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% {
            transform: scale(1);
        }
        50% {
            transform: scale(1.05);
        }
    }

    .header-icon i {
        font-size: 40px;
        color: white;
    }

    .card-header h1 {
        color: white;
        font-size: 28px;
        font-weight: 600;
        margin: 0;
        position: relative;
        z-index: 1;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    .card-header p {
        color: rgba(255, 255, 255, 0.9);
        margin: 10px 0 0;
        font-size: 14px;
        position: relative;
        z-index: 1;
    }

    /* Form Content */
    .card-content {
        padding: 40px;
    }

    /* Form Group Styling */
    .form-group-modern {
        margin-bottom: 30px;
    }

    .form-group-modern label {
        display: block;
        margin-bottom: 12px;
        font-weight: 600;
        color: #2d3748;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .label-with-icon {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .label-with-icon i {
        color: #667eea;
        font-size: 18px;
    }

    /* Mechanic Info Card */
    .mechanic-info {
        background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
        border-radius: 16px;
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 30px;
        border: 1px solid rgba(102, 126, 234, 0.2);
        transition: all 0.3s ease;
    }

    .mechanic-info:hover {
        transform: translateX(5px);
        border-color: #667eea;
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
    }

    .mechanic-avatar {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .mechanic-avatar i {
        font-size: 28px;
        color: white;
    }

    .mechanic-details {
        flex: 1;
    }

    .mechanic-details h3 {
        margin: 0 0 5px;
        font-size: 18px;
        font-weight: 600;
        color: #2d3748;
    }

    .mechanic-details p {
        margin: 0;
        font-size: 13px;
        color: #718096;
    }

    .status-badge {
        display: inline-block;
        padding: 4px 12px;
        background: #48bb78;
        color: white;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
    }

    /* Select Dropdown Styling */
    .custom-select {
        position: relative;
    }

    .custom-select select {
        width: 100%;
        padding: 14px 16px;
        font-size: 16px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        background: white;
        color: #2d3748;
        cursor: pointer;
        transition: all 0.3s ease;
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        font-weight: 500;
    }

    .custom-select select:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .custom-select i {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: #a0aec0;
        pointer-events: none;
        font-size: 18px;
    }

    /* Status Options Styling */
    .status-options {
        display: flex;
        gap: 20px;
        margin-top: 10px;
    }

    .status-option {
        flex: 1;
        position: relative;
    }

    .status-option input {
        position: absolute;
        opacity: 0;
        cursor: pointer;
    }

    .status-option label {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 12px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin: 0;
        font-weight: 500;
        background: white;
    }

    .status-option input:checked + label {
        border-color: #667eea;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }

    .status-option input:checked + label i {
        color: white;
    }

    .status-option label i {
        font-size: 18px;
        color: #a0aec0;
        transition: color 0.3s ease;
    }

    /* Submit Button */
    .submit-button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .submit-button::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
    }

    .submit-button:hover::before {
        width: 300px;
        height: 300px;
    }

    .submit-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .submit-button:active {
        transform: translateY(0);
    }

    .submit-button i {
        margin-right: 8px;
    }

    /* Alert Messages */
    .alert-message {
        margin-bottom: 20px;
        padding: 12px 16px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateX(-20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .alert-success {
        background: #c6f6d5;
        color: #22543d;
        border-left: 4px solid #48bb78;
    }

    .alert-error {
        background: #fed7d7;
        color: #742a2a;
        border-left: 4px solid #f56565;
    }

    .alert-info {
        background: #bee3f8;
        color: #2c5282;
        border-left: 4px solid #4299e1;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        .attendance-container {
            padding: 15px;
            margin: 20px auto;
        }

        .card-content {
            padding: 25px;
        }

        .card-header h1 {
            font-size: 24px;
        }

        .header-icon {
            width: 60px;
            height: 60px;
        }

        .header-icon i {
            font-size: 30px;
        }

        .mechanic-info {
            flex-direction: column;
            text-align: center;
        }

        .status-options {
            flex-direction: column;
            gap: 10px;
        }
    }

    /* Loading Animation */
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .loading {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s ease-in-out infinite;
    }
</style>

<div class="attendance-container">
    <div class="attendance-card">
        <div class="card-header">
            <div class="header-icon">
                <i class="fa fa-calendar-check-o"></i>
            </div>
            <h1>Mark Attendance</h1>
            <p>Record your daily attendance status</p>
        </div>
        
        <div class="card-content">
            <form action="." enctype="multipart/form-data" method="POST" id="attendanceForm">
                {% csrf_token %}
                
                <!-- Mechanic Info -->
                <div class="mechanic-info">
                    <div class="mechanic-avatar">
                        <i class="fa fa-user-md"></i>
                    </div>
                    <div class="mechanic-details">
                        <h3>{{ mechanic }}</h3>
                        <p>Mechanic ID: #MECH{{ mechanic.id|default:"000" }}</p>
                    </div>
                    <div class="status-badge">
                        <i class="fa fa-id-card"></i> Active
                    </div>
                </div>

                <!-- Attendance Status with Radio Buttons -->
                <div class="form-group-modern">
                    <div class="label-with-icon">
                        <i class="fa fa-check-circle"></i>
                        <label>Attendance Status</label>
                    </div>
                    <div class="status-options">
                        <div class="status-option">
                            <input type="radio" name="present_status" value="yes" id="status-yes" checked>
                            <label for="status-yes">
                                <i class="fa fa-check"></i>
                                Present
                            </label>
                        </div>
                        <div class="status-option">
                            <input type="radio" name="present_status" value="no" id="status-no">
                            <label for="status-no">
                                <i class="fa fa-times"></i>
                                Absent
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-button" id="submitBtn">
                    <i class="fa fa-save"></i>
                    <span>Submit Attendance</span>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    // Add loading animation on form submit
    const form = document.getElementById('attendanceForm');
    const submitBtn = document.getElementById('submitBtn');
    
    if (form) {
        form.addEventListener('submit', function(e) {
            const originalContent = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Submitting...';
            submitBtn.disabled = true;
            
            // Optional: You can remove this timeout if you want the loading to continue
            // until the form actually submits. This is just for demo purposes.
            setTimeout(() => {
                submitBtn.innerHTML = originalContent;
                submitBtn.disabled = false;
            }, 3000);
        });
    }
    
    // Add hover effect to radio options
    const radioOptions = document.querySelectorAll('.status-option');
    radioOptions.forEach(option => {
        option.addEventListener('mouseenter', function() {
            this.style.transform = 'translateY(-2px)';
        });
        
        option.addEventListener('mouseleave', function() {
            this.style.transform = 'translateY(0)';
        });
    });
</script>

{% endblock %}
